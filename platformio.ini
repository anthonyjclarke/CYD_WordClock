; CYD WordClock — ESP32-2432S028R
; ILI9341 240×320 portrait · XPT2046 touch · NTP via WiFi
; Word clock logic ported from Brett Oliver's Word Clock (wordclock_v4_9, LED matrix → TFT)
; Original: https://www.brettoliver.org.uk/Word_Clock/Word_Clock.htm

[platformio]
default_envs = wordclock_cyd

[env:wordclock_cyd]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 230400
board_build.partitions = partitions_custom.csv

lib_deps =
    bodmer/TFT_eSPI@^2.4.76
    https://github.com/PaulStoffregen/XPT2046_Touchscreen
    tzapu/WiFiManager
    ropg/ezTime

build_flags =
    ; ── TFT_eSPI CYD pin config ───────────────────────────────────────────────
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTOUCH_CS=33
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    ; ── Project ──────────────────────────────────────────────────────────────
    -DDEBUG_LEVEL=3
    -DCORE_DEBUG_LEVEL=0
